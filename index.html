<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>foodie</title>
    <script>
      (function () {
        var mode = localStorage.getItem('foodiefy-theme-mode');
        var manualTheme = localStorage.getItem('foodiefy-theme');

        function getAutoThemeByHour(hour) {
          if (hour >= 6 && hour < 12) return 'original';
          if (hour >= 12 && hour < 18) return 'light';
          return 'dark';
        }

        var phHour = parseInt(
          new Intl.DateTimeFormat('en-US', {
            hour: '2-digit',
            hour12: false,
            timeZone: 'Asia/Manila'
          }).format(new Date()),
          10
        );

        var t = mode === 'manual' && manualTheme ? manualTheme : getAutoThemeByHour(phHour);
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
